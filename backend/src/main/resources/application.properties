spring.application.name=blinkit-backend
server.port=8084

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/blinkit_db_cursor?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sumit@2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=blinkit-super-secret-jwt-key-min-32-chars!!
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Inventory
app.inventory.low-stock-threshold=10

# Logging
logging.level.com.cursor.backend=INFO

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
